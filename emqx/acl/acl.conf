%% Superusers (backend services) — full access
{allow, {username, "publisher"}, all, ["#"]}.

%% Each client can only publish/subscribe to its own user topic
{allow, all, publish,   ["users/${username}/#"]}.
{allow, all, subscribe, ["users/${username}/#"]}.

%% Everyone can subscribe to public topics
{allow, all, subscribe, ["public/#"]}.

%% Deny everything else
{deny, all}.
