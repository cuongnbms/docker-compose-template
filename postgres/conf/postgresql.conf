# Just optimize config for VM 4GB RAM, pls update

# -----------------------------
# Connection Settings
# -----------------------------
listen_addresses = '*'
max_connections = 200

# -----------------------------
# Memory Optimization (Based on 4GB RAM VM)
# -----------------------------
shared_buffers = 1GB                  # 25% of total RAM
effective_cache_size = 3GB            # 75% of total RAM
work_mem = 16MB                       # Memory per query sort/hash operation
maintenance_work_mem = 256MB          # Memory for maintenance tasks (vacuum, index)

# -----------------------------
# I/O Optimization (For SSD)
# -----------------------------
random_page_cost = 1.1                # Optimized for SSD (default 4.0 for HDD)
effective_io_concurrency = 200        # Leverages parallel I/O capabilities of SSDs
checkpoint_completion_target = 0.9    # Reduces I/O spikes during checkpoints

# -----------------------------
# Write Ahead Log (WAL)
# -----------------------------
wal_buffers = 16MB
min_wal_size = 1GB
max_wal_size = 4GB

# -----------------------------
# Logging (Critical for Production)
# -----------------------------
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_statement = 'none'                # Change to 'ddl' to log structural changes
log_min_duration_statement = 500      # Log queries exceeding 500ms